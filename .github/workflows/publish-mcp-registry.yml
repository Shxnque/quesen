name: Publish to MCP Registry

# Publishes server.json to the official Model Context Protocol registry
# (registry.modelcontextprotocol.io) on every published GitHub Release.
#
# Uses GitHub Actions OIDC for namespace verification — no operator PAT needed.
# See https://modelcontextprotocol.io / https://github.com/modelcontextprotocol/registry.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (leave empty to use latest release)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for github-oidc auth
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          set -eux
          curl -sSL -o /tmp/mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          mkdir -p /tmp/mcp-publisher
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp/mcp-publisher
          sudo mv /tmp/mcp-publisher/mcp-publisher /usr/local/bin/mcp-publisher
          sudo chmod +x /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -10

      - name: Validate server.json
        run: mcp-publisher validate

      - name: Authenticate via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to the official MCP Registry
        run: mcp-publisher publish
